<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: #f8fafc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    canvas {
      background: #111827;
      border: 2px solid #f59e0b;
    }

    h1 {
      margin: 10px 0;
      font-size: 1.2rem;
      color: #facc15;
    }

    #score {
      margin-bottom: 10px;
      font-size: 1rem;
      color: #38bdf8;
    }

    #restartBtn {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #f59e0b;
      color: #111;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: none;
    }

    /* D-Pad */
    .dpad {
      display: none;
      margin-top: 20px;
      position: relative;
      width: 160px;
      height: 160px;
    }

    .dpad-btn {
      position: absolute;
      width: 52px;
      height: 52px;
      background: #1e293b;
      border: 2px solid #f59e0b;
      border-radius: 12px;
      color: #facc15;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.1s;
    }

    .dpad-btn:active {
      background: #f59e0b;
      color: #111;
      transform: scale(0.92);
    }

    .dpad-up    { top: 0;    left: 50%;  transform: translateX(-50%); }
    .dpad-down  { bottom: 0; left: 50%;  transform: translateX(-50%); }
    .dpad-left  { left: 0;   top: 50%;   transform: translateY(-50%); }
    .dpad-right { right: 0;  top: 50%;   transform: translateY(-50%); }

    .dpad-up:active    { transform: translateX(-50%) scale(0.92); }
    .dpad-down:active  { transform: translateX(-50%) scale(0.92); }
    .dpad-left:active  { transform: translateY(-50%) scale(0.92); }
    .dpad-right:active { transform: translateY(-50%) scale(0.92); }

    .dpad-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      background: #f59e0b33;
      border-radius: 50%;
    }

    @media (max-width: 767px) {
      .dpad { display: block; }
      h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <h1>🐍 Use as setas para jogar</h1>
  <div id="score">Pontos: 0</div>
<canvas id="game"></canvas>

<style>
  canvas {
    width: 300px;
    height: 300px;
    touch-action: none;
  }

  @media (min-width: 768px) {
    canvas {
      width: 500px;
      height: 500px;
    }
  }
</style>
  <button id="restartBtn" onclick="restartGame()">Reiniciar</button>

  <!-- D-Pad mobile -->
  <div class="dpad" id="dpad">
    <div class="dpad-btn dpad-up"    id="btn-up">▲</div>
    <div class="dpad-btn dpad-left"  id="btn-left">◀</div>
    <div class="dpad-center"></div>
    <div class="dpad-btn dpad-right" id="btn-right">▶</div>
    <div class="dpad-btn dpad-down"  id="btn-down">▼</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    const grid = 15;
    let snake;
    let apple;
    let count = 0;
    let speed = 10;
    let score = 0;
    let gameOver = false;

    function resetGame() {
      snake = {
        x: 150,
        y: 150,
        dx: grid,
        dy: 0,
        cells: [],
        maxCells: 4
      };
      apple = {
        x: getRandomInt(0, 20) * grid,
        y: getRandomInt(0, 20) * grid
      };
      score = 0;
      speed = 10;
      gameOver = false;
      count = 0;
      scoreEl.innerText = "Pontos: 0";
      restartBtn.style.display = "none";
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function loop() {
      if (gameOver) return;
      requestAnimationFrame(loop);

      if (++count < speed) return;
      count = 0;
      const canvasSize = Math.floor(Math.min(canvas.clientWidth, canvas.clientHeight));
      canvas.width = canvasSize;
      canvas.height = canvasSize;
    ctx.clearRect(0, 0, canvasSize, canvasSize);

      snake.x += snake.dx;
      snake.y += snake.dy;

      // Bateu na parede
      if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
        gameOver = true;
        restartBtn.style.display = "block";
        return;
      }

      snake.cells.unshift({ x: snake.x, y: snake.y });
      if (snake.cells.length > snake.maxCells) {
        snake.cells.pop();
      }

      ctx.fillStyle = "#f59e0b";
      ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      ctx.fillStyle = "#22d3ee";
      snake.cells.forEach((cell, index) => {
        ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        // Comeu a maçã
        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          scoreEl.innerText = `Pontos: ${score}`;
          apple.x = getRandomInt(0, 20) * grid;
          apple.y = getRandomInt(0, 20) * grid;
          if (speed > 2) speed -= 0.5; // aumenta velocidade
        }

        // Colidiu com si mesmo
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            gameOver = true;
            restartBtn.style.display = "block";
            return;
          }
        }
      });
    }

    function restartGame() {
      resetGame();
      requestAnimationFrame(loop);
    }

    // --- Direção helper ---
    function setDirection(dir) {
      if (dir === 'left'  && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
      if (dir === 'up'    && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
      if (dir === 'right' && snake.dx === 0) { snake.dx = grid;  snake.dy = 0; }
      if (dir === 'down'  && snake.dy === 0) { snake.dy = grid;  snake.dx = 0; }
    }

    // --- Keyboard ---
    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft")  setDirection('left');
      if (e.key === "ArrowUp")    setDirection('up');
      if (e.key === "ArrowRight") setDirection('right');
      if (e.key === "ArrowDown")  setDirection('down');
    });

    // --- D-Pad buttons ---
    document.getElementById("btn-up").addEventListener("touchstart",    (e) => { e.preventDefault(); setDirection('up');    }, { passive: false });
    document.getElementById("btn-down").addEventListener("touchstart",  (e) => { e.preventDefault(); setDirection('down');  }, { passive: false });
    document.getElementById("btn-left").addEventListener("touchstart",  (e) => { e.preventDefault(); setDirection('left');  }, { passive: false });
    document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); setDirection('right'); }, { passive: false });

    // --- Swipe on canvas ---
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", function (e) {
      e.preventDefault();
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener("touchend", function (e) {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      // Minimum swipe distance of 20px
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 'right' : 'left');
      } else {
        setDirection(dy > 0 ? 'down' : 'up');
      }
    }, { passive: false });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
